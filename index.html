<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 먼작귀 진짜 구간 자르기 툴 (무손실) ⚡</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f7f9fa;
            color: #333;
            padding: 20px;
            max-width: 850px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #ffcb05; text-shadow: 1px 1px 1px #333; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .upload-area {
            border: 3px dashed #ffcb05;
            text-align: center;
            padding: 30px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            background-color: #fffdf0;
        }
        video {
            width: 100%;
            max-height: 450px;
            background: #000;
            border-radius: 6px;
            display: none;
            margin-top: 15px;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            background: #f0f0f0;
            padding: 12px;
            border-radius: 6px;
            font-size: 1.05rem;
            font-weight: bold;
            margin: 15px 0;
            flex-wrap: wrap;
            gap: 8px;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-nav { background-color: #e2e8f0; color: #334155; }
        .btn-nav:hover { background-color: #cbd5e1; }
        .btn-start { background-color: #3b82f6; color: white; }
        .btn-start:hover { background-color: #2563eb; }
        .btn-end { background-color: #ef4444; color: white; }
        .btn-end:hover { background-color: #dc2626; }
        .btn-trim {
            background-color: #10b981;
            color: white;
            width: 100%;
            font-size: 1.2rem;
            padding: 15px;
            margin-top: 10px;
        }
        .btn-trim:hover { background-color: #059669; }
        button:disabled { background-color: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed; }
        .status {
            text-align: center;
            font-weight: bold;
            color: #2563eb;
            margin-top: 10px;
            font-size: 1.05rem;
            min-height: 1.4em;
        }
        .progress-wrap {
            width: 100%;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            height: 10px;
            margin-top: 10px;
            display: none;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #10b981;
            transition: width 0.15s ease;
        }
        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .mode-btn {
            flex: 1;
            max-width: 260px;
            padding: 10px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .mode-btn.active {
            border-color: #10b981;
            background: #ecfdf5;
            color: #059669;
        }
        .mode-desc {
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .badge {
            display: inline-block;
            background: #10b981;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <h1>🎬 먼작귀 웹 자체 영상 트림 툴 <span class="badge">무손실</span></h1>
    <div class="subtitle">FFmpeg.wasm 기반 · 화질 손실 없는 진짜 구간 자르기</div>

    <div class="box">
        <div class="upload-area" onclick="document.getElementById('video-input').click()">
            📁 여기에 편집할 먼작귀 영상 파일을 선택해 주세요 (클릭)
            <input type="file" id="video-input" accept="video/mp4, video/webm, video/quicktime" style="display:none;">
            <div id="file-name" style="font-size:0.9rem; color:#777; margin-top:8px;"></div>
        </div>
        <video id="player" controls></video>
    </div>

    <div class="box" id="editor-controls" style="display:none;">
        <div class="time-info">
            <div>⏱️ 현재 위치: <span id="t-curr">0.00</span>초</div>
            <div style="color:#3b82f6;">▶ 시작점: <span id="t-start">0.00</span>초</div>
            <div style="color:#ef4444;">■ 종료점: <span id="t-end">0.00</span>초</div>
        </div>

        <div class="btn-container">
            <button class="btn-nav" onclick="moveFrame(-1)">◀ 1프레임 뒤로</button>
            <button class="btn-start" onclick="setPoint('start')">🎯 여기부터 자르기 (시작)</button>
            <button class="btn-end" onclick="setPoint('end')">🎯 여기까지만 자르기 (종료)</button>
            <button class="btn-nav" onclick="moveFrame(1)">1프레임 앞으로 ▶</button>
        </div>

        <div class="mode-toggle">
            <div class="mode-btn active" id="mode-copy-btn" onclick="setMode('copy')">
                ⚡ 초고속 모드 (무손실)
            </div>
            <div class="mode-btn" id="mode-reencode-btn" onclick="setMode('reencode')">
                🎯 정밀 모드 (프레임 정확)
            </div>
        </div>
        <div class="mode-desc" id="mode-desc">
            원본 화질 그대로, 재인코딩 없이 스트림만 잘라냅니다. 매우 빠르지만 시작점이 가까운 키프레임으로
            살짝(최대 몇 프레임) 조정될 수 있습니다.
        </div>

        <button class="btn-trim" id="download-btn" onclick="trimAndDownload()">⚡ 선택 구간 자르고 다운로드 ⚡</button>
        <div class="progress-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="status" id="status-msg"></div>
    </div>

    <!-- ffmpeg.wasm은 아래 스크립트에서 동적으로 로드합니다 (로드 실패 시 원인을 화면에 표시하기 위함) -->
    <script>
        const input = document.getElementById('video-input');
        const player = document.getElementById('player');
        const fileNameDiv = document.getElementById('file-name');
        const controls = document.getElementById('editor-controls');

        const tCurr = document.getElementById('t-curr');
        const tStart = document.getElementById('t-start');
        const tEnd = document.getElementById('t-end');
        const statusMsg = document.getElementById('status-msg');
        const downloadBtn = document.getElementById('download-btn');
        const progressWrap = document.getElementById('progress-wrap');
        const progressBar = document.getElementById('progress-bar');
        const modeDesc = document.getElementById('mode-desc');

        let videoFile = null;
        let startTime = 0;
        let endTime = 0;
        let mode = 'copy'; // 'copy' = 무손실 스트림 카피, 'reencode' = 프레임 정확 재인코딩
        const fps = 30;

        const MODE_DESCRIPTIONS = {
            copy: '원본 화질 그대로, 재인코딩 없이 스트림만 잘라냅니다. 매우 빠르지만 시작점이 가까운 키프레임으로 살짝(최대 몇 프레임) 조정될 수 있습니다.',
            reencode: '지정한 시작/종료 지점을 프레임 단위로 정확히 자릅니다. 원본을 다시 인코딩하므로 초고속 모드보다 시간이 더 걸리고, 화질/용량이 설정값(CRF 18)에 따라 미세하게 달라질 수 있습니다.'
        };

        function setMode(m) {
            mode = m;
            document.getElementById('mode-copy-btn').classList.toggle('active', m === 'copy');
            document.getElementById('mode-reencode-btn').classList.toggle('active', m === 'reencode');
            modeDesc.innerText = MODE_DESCRIPTIONS[m];
        }

        // ---- 스크립트 동적 로더 (여러 CDN 순차 폴백) ----
        function loadScriptOnce(url) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = url;
                s.onload = () => resolve(url);
                s.onerror = () => reject(new Error(`스크립트 로드 실패: ${url}`));
                document.head.appendChild(s);
            });
        }

        async function loadFromCandidates(candidates, checkFn, label) {
            let lastErr = null;
            for (const url of candidates) {
                try {
                    await loadScriptOnce(url);
                    // 스크립트 태그의 onload는 실행 완료를 보장하지 않을 수 있어 짧게 재확인
                    for (let i = 0; i < 20; i++) {
                        if (checkFn()) return url;
                        await new Promise(r => setTimeout(r, 100));
                    }
                    lastErr = new Error(`${label} 로드는 됐지만 전역 객체를 찾을 수 없음: ${url}`);
                } catch (e) {
                    lastErr = e;
                }
            }
            throw lastErr || new Error(`${label}를 로드할 수 있는 CDN이 없습니다.`);
        }

        // ---- FFmpeg 인스턴스 (지연 로딩: 처음 자르기 누를 때 로드) ----
        let ffmpeg = null;
        let ffmpegLoaded = false;

        async function ensureFFmpeg() {
            if (ffmpegLoaded) return ffmpeg;

            statusMsg.innerText = '🔧 변환 엔진(FFmpeg.wasm) 스크립트 불러오는 중...';

            // 1) @ffmpeg/ffmpeg UMD 로드 (jsDelivr 실패 시 unpkg, cdnjs 순으로 폴백)
            await loadFromCandidates(
                [
                    'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.min.js',
                    'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.min.js',
                    'https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.12.10/umd/ffmpeg.min.js'
                ],
                () => typeof window.FFmpeg !== 'undefined' && typeof window.FFmpeg.FFmpeg === 'function',
                'FFmpeg 코어 라이브러리'
            );

            // 2) @ffmpeg/util UMD 로드 (toBlobURL 제공)
            await loadFromCandidates(
                [
                    'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.min.js',
                    'https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.min.js',
                    'https://cdnjs.cloudflare.com/ajax/libs/ffmpeg-util/0.12.1/umd/index.min.js'
                ],
                () => typeof window.FFmpegUtil !== 'undefined' && typeof window.FFmpegUtil.toBlobURL === 'function',
                'FFmpeg 유틸리티(toBlobURL)'
            );

            statusMsg.innerText = '🔧 변환 엔진(FFmpeg.wasm) 초기화 중... (약 20~30MB, 몇 초 소요)';

            const FFmpegClass = window.FFmpeg.FFmpeg;
            const toBlobURL = window.FFmpegUtil.toBlobURL;
            ffmpeg = new FFmpegClass();

            ffmpeg.on('log', ({ message }) => {
                // 콘솔에만 남기고 UI는 progress 이벤트로 갱신
                console.log(message);
            });

            ffmpeg.on('progress', ({ progress }) => {
                const pct = Math.min(100, Math.max(0, Math.round(progress * 100)));
                progressBar.style.width = pct + '%';
            });

            // CDN에서 직접 로드 시 CORS 이슈가 잦아, blob URL로 감싸서 로드
            const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/umd';
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
            });

            ffmpegLoaded = true;
            return ffmpeg;
        }

        input.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            videoFile = file;
            fileNameDiv.innerText = `선택된 파일: ${file.name}`;

            const fileURL = URL.createObjectURL(file);
            player.src = fileURL;
            player.style.display = 'block';
            controls.style.display = 'block';
            statusMsg.innerText = '';
            progressWrap.style.display = 'none';
            progressBar.style.width = '0%';

            player.onloadedmetadata = function() {
                startTime = 0;
                endTime = player.duration;
                tStart.innerText = startTime.toFixed(2);
                tEnd.innerText = endTime.toFixed(2);
                tCurr.innerText = player.currentTime.toFixed(2);
            };
        });

        player.addEventListener('timeupdate', () => {
            tCurr.innerText = player.currentTime.toFixed(2);
        });
        player.addEventListener('seeked', () => {
            tCurr.innerText = player.currentTime.toFixed(2);
        });

        function moveFrame(delta) {
            player.pause();
            let newTime = player.currentTime + (delta * (1 / fps));
            if (newTime < 0) newTime = 0;
            if (newTime > player.duration) newTime = player.duration;
            player.currentTime = newTime;
        }

        window.addEventListener('keydown', (e) => {
            if (controls.style.display === 'block') {
                if (e.key === "ArrowLeft") { e.preventDefault(); moveFrame(-1); }
                else if (e.key === "ArrowRight") { e.preventDefault(); moveFrame(1); }
            }
        });

        function setPoint(type) {
            if (type === 'start') {
                startTime = player.currentTime;
                if (startTime >= endTime) endTime = player.duration;
            } else {
                endTime = player.currentTime;
                if (endTime <= startTime) startTime = 0;
            }
            tStart.innerText = startTime.toFixed(2);
            tEnd.innerText = endTime.toFixed(2);
        }

        function formatTimeForFFmpeg(seconds) {
            // HH:MM:SS.mmm 형식 (ffmpeg -ss/-to 인자용)
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = (seconds % 60).toFixed(3);
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(6,'0')}`;
        }

        function getExtension(filename) {
            const parts = filename.split('.');
            return parts.length > 1 ? parts.pop().toLowerCase() : 'mp4';
        }

        async function trimAndDownload() {
            if (!videoFile) return;
            if (startTime >= endTime) {
                alert("시작 시간이 종료 시간보다 크거나 같습니다!");
                return;
            }

            downloadBtn.disabled = true;
            player.pause();
            progressWrap.style.display = 'block';
            progressBar.style.width = '0%';

            try {
                const ff = await ensureFFmpeg();

                const inExt = getExtension(videoFile.name);
                const inputName = `input.${inExt}`;
                // copy 모드는 컨테이너 유지, reencode는 화질 보존을 위해 mp4로 통일
                const outExt = mode === 'copy' ? inExt : 'mp4';
                const outputName = `output.${outExt}`;

                statusMsg.innerText = '📥 영상 파일을 엔진에 불러오는 중...';
                const fileData = new Uint8Array(await videoFile.arrayBuffer());
                await ff.writeFile(inputName, fileData);

                const ss = formatTimeForFFmpeg(startTime);
                const to = formatTimeForFFmpeg(endTime);

                let args;
                if (mode === 'copy') {
                    statusMsg.innerText = '⚡ 무손실 스트림 카피로 자르는 중... (재인코딩 없음)';
                    // -ss를 -i 뒤에 두면 더 정확하지만 copy 모드에선 느려질 수 있어 앞에 둠(키프레임 스냅)
                    args = ['-ss', ss, '-to', to, '-i', inputName, '-c', 'copy', '-avoid_negative_ts', 'make_zero', outputName];
                } else {
                    statusMsg.innerText = '🎯 프레임 정확 모드로 재인코딩 중... (시간이 더 걸려요)';
                    // -i 뒤에 -ss/-to를 둬서 프레임 단위로 정확하게 자르고, CRF 18로 화질 손실 최소화
                    args = ['-i', inputName, '-ss', ss, '-to', to, '-c:v', 'libx264', '-crf', '18', '-preset', 'fast', '-c:a', 'aac', '-b:a', '192k', outputName];
                }

                await ff.exec(args);

                statusMsg.innerText = '💾 결과 파일을 꺼내는 중...';
                const data = await ff.readFile(outputName);

                const mimeType = outExt === 'webm' ? 'video/webm' : 'video/mp4';
                const blob = new Blob([data.buffer], { type: mimeType });
                const url = URL.createObjectURL(blob);

                const baseName = videoFile.name.substring(0, videoFile.name.lastIndexOf('.')) || videoFile.name;
                const a = document.createElement('a');
                a.href = url;
                a.download = `cut_${baseName}.${outExt}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // 메모리 정리
                await ff.deleteFile(inputName);
                await ff.deleteFile(outputName);

                statusMsg.innerText = '✅ 다운로드 완료! (무손실 · 원본 화질 유지)';
                progressBar.style.width = '100%';
            } catch (err) {
                console.error(err);
                statusMsg.innerText = '❌ 오류가 발생했어요: ' + (err && err.message ? err.message : String(err));
            } finally {
                downloadBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
